services:
  - type: web
    name: new-trader-paper-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 scripts/paper_trade_server.py --host 0.0.0.0 --port $PORT --interval-sec 120 --days 1 --warmup-days 10 --market data_api_spot --entry-mode maker_limit --modules ANKR RIF GALA_73 GALA_10 GALA_112 SPELL
    plan: pro
